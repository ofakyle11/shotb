[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate-video"]
  timeout = 60

[functions."serve-openai-video"]
  timeout = 60

[functions."enrich-characters"]
  timeout = 60

[functions."enrich-locations"]
  timeout = 60

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/timeline/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/timeline/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Deprecated surfaces — dashboard.html is an unrelated leftover ("Atlas Analysis"
# stock dashboard) and workflow/ + its agent stubs were never completed. Blocked
# from serving; the files can be deleted from the repo once confirmed.
[[redirects]]
  from = "/dashboard.html"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/workflow/*"
  to = "/404.html"
  status = 404
  force = true

# Stray repo artifact — never serve (the space/parens filename dodges .netlifyignore globs).
[[redirects]]
  from = "/Shotbreak-main%20(1).zip"
  to = "/404.html"
  status = 404
  force = true

# Block ops/internal files — force=true overrides static file serving (_redirects alone cannot).
