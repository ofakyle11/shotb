[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate-video"]
  timeout = 60

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Block ops/internal files — force=true overrides static file serving (_redirects alone cannot).
[[redirects]]
  from = "/DO_THIS_NOW.txt"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/MINIMAL_DO_THIS_NOW.txt"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/POST_IMPLEMENTATION_CHECKLIST.txt"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/FIX_ALL_DEPLOY.txt"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/OWNER_LOGIN.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/get-owner-token.ps1"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/.grok/*"
  to = "/404.html"
  status = 404
  force = true

# For the full golden HTML deploy, the app.html is the main file (large single file golden pushed via web editor ritual as documented).
# Functions auto-deploy on git push.