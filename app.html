<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shotbreak &mdash; Media Hub</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{--bg:#0D0D0D;--card:#141414;--card2:#1A1A1A;--card3:#202020;--input:#181818;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);--gold:#D4A843;--gold-bg:rgba(212,168,67,0.12);--gold-border:rgba(212,168,67,0.5);--green:#3DD68C;--text:#F0F0F0;--text-dim:#888;--text-muted:#555;--text-label:#666;--red:#E05252;--sidebar-w:200px;--r:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:13px;display:flex;height:100vh;overflow:hidden;line-height:1.4}
#boot{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
#boot-text{font-size:12px;color:var(--text-muted);letter-spacing:.08em}
#boot-err{font-size:11px;color:var(--red);display:none;max-width:400px;text-align:center;line-height:1.6}
#sidebar{width:var(--sidebar-w);background:#0A0A0A;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-project{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sb-project-label{font-size:9px;font-weight:600;letter-spacing:.14em;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
.sb-project-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.sb-steps{flex:1;padding:12px 0;overflow-y:auto}
.sb-step{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .15s}
.sb-step:hover{background:rgba(255,255,255,.03)}
.sb-step.active{background:rgba(212,168,67,.06)}
.sb-step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1.5px solid var(--border2);color:var(--text-muted);background:transparent}
.sb-step.done .sb-step-num{background:var(--green);border-color:var(--green);color:#000;font-size:12px}
.sb-step.active .sb-step-num{background:var(--gold);border-color:var(--gold);color:#000}
.sb-step-label{font-size:13px;font-weight:500;color:var(--text-muted)}
.sb-step.done .sb-step-label,.sb-step.active .sb-step-label{color:var(--text)}
.sb-step.active .sb-step-label{font-weight:600}
.sb-step-now{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
.sb-crew{border-top:1px solid var(--border);padding:14px 16px}
.sb-crew-label{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.sb-crew-count{background:var(--card3);border:1px solid var(--border);border-radius:10px;padding:1px 7px;font-size:10px;color:var(--text-dim)}
.sb-crew-agent{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-dim);padding:3px 0}
.sb-crew-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.sb-crew-dot.running{background:var(--green);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sb-footer{border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.sb-footer-email{font-size:11px;color:var(--text-muted)}
.sb-footer-badge{font-size:10px;color:var(--text-muted);background:var(--card3);border:1px solid var(--border);border-radius:4px;padding:2px 6px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-meta{font-size:12px;color:var(--text-dim)}
.topbar-meta strong{color:var(--text);font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text-dim);transition:all .15s;white-space:nowrap;font-family:inherit}
.tb-btn:hover{color:var(--text);background:var(--card2)}
.tb-btn.gold{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600}
.tb-btn.gold:hover{background:#E8BC55}
#content{flex:1;overflow-y:auto;padding:28px 32px}
.page-header{margin-bottom:28px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.page-subtitle{font-size:13px;color:var(--text-dim);line-height:1.5;max-width:600px}
.scene-group{margin-bottom:20px}
.scene-header-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px}
.scene-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;border:1.5px solid var(--gold);border-radius:24px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);cursor:pointer;background:transparent;transition:background .15s;font-family:inherit}
.scene-pill:hover{background:var(--gold-bg)}
.scene-master-link{font-size:12px;color:var(--text-muted);cursor:pointer;transition:color .15s}
.scene-master-link:hover{color:var(--text-dim)}
.scene-clips.collapsed{display:none}
.clip-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s;margin-bottom:8px}
.clip-card:hover{border-color:var(--border2)}
.clip-card.locked{border-color:var(--gold);background:rgba(212,168,67,.03)}
.clip-header{display:flex;align-items:center;padding:10px 14px;gap:12px;background:var(--card2);border-bottom:1px solid var(--border)}
.clip-id{background:var(--gold);color:#000;font-size:11px;font-weight:800;padding:3px 9px;border-radius:4px;letter-spacing:.04em;flex-shrink:0}



.clip-header-actions{margin-left:auto;display:flex;gap:6px;align-items:center}
.clip-btn{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text-dim);transition:all .15s;font-family:inherit}
.clip-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.clip-btn.lock-active{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.clip-body{padding:16px 14px}
.clip-body.hidden{display:none}
.field-section{margin-bottom:14px}
.field-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.field-label{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-label);text-transform:uppercase}
.field-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text-dim);text-transform:uppercase;padding:3px 8px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;transition:all .15s;font-family:inherit;background:transparent}
.field-badge:hover{border-color:var(--gold-border);color:var(--gold)}
.clip-textarea{width:100%;background:var(--input);border:none;border-radius:var(--r);color:var(--text);font-size:12.5px;padding:12px 14px;resize:vertical;min-height:90px;font-family:inherit;line-height:1.6;transition:background .15s}
.clip-textarea:focus{outline:none;background:#1E1E1E}
.clip-textarea.bg-field{min-height:60px;color:var(--text-dim);font-style:italic}
.clip-textarea.has-proposal{background:rgba(212,168,67,.06)}
.coverage-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:4px}
.gen-section-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);margin-top:4px}.cov-field{display:flex;flex-direction:column;gap:4px}
.cov-label-row{display:flex;align-items:center;justify-content:space-between}
.cov-label{font-size:8.5px;font-weight:700;letter-spacing:.12em;color:var(--text-label);text-transform:uppercase}
.cov-inherit-btn{background:none;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;padding:0;line-height:1;transition:color .15s;font-family:inherit}
.cov-inherit-btn:hover{color:var(--gold)}
.cov-input{background:var(--input);border:1px solid var(--border);border-radius:4px;color:var(--text-muted);font-size:11px;padding:6px 8px;font-family:inherit;font-style:italic;transition:all .15s;width:100%}
.cov-input:focus{outline:none;border-color:var(--gold-border);color:var(--text);font-style:normal}
.agent-stack{margin-bottom:14px;padding:12px 14px;background:var(--card2);border-radius:var(--r);border:1px solid var(--border)}
.agent-stack-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.agent-stack-title{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-muted);text-transform:uppercase}
.agent-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.agent-chip{position:relative;overflow:hidden;padding:4px 10px;border-radius:4px;font-size:10.5px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card3);color:var(--text-muted);transition:all .15s;white-space:nowrap;font-family:inherit}
.agent-chip:hover{border-color:var(--border2);color:var(--text-dim)}
.agent-chip.selected{border-color:var(--gold-border);color:var(--gold);background:var(--gold-bg)}
.agent-chip.complete{border-color:rgba(61,214,140,.4);color:var(--green);background:rgba(61,214,140,.08)}
.chip-progress{position:absolute;top:0;left:0;bottom:0;background:var(--gold);z-index:0;transition:width .3s;width:0%}
.chip-label{position:relative;z-index:1}
.agent-run-row{display:flex;gap:8px;align-items:center}
.run-btn{padding:5px 14px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--card3);color:var(--text-dim);transition:all .15s;font-family:inherit}
.run-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.run-btn.primary{background:var(--gold);border-color:var(--gold);color:#000}
.run-btn.primary:hover{background:#E8BC55}
.run-progress{margin-top:8px;display:none}
.run-progress.show{display:block}
.run-progress-text{font-size:10px;color:var(--text-muted);margin-bottom:4px}
.pbar{background:var(--card3);border-radius:2px;height:3px;overflow:hidden}
.pbar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
.agent-log{background:var(--input);border:1px solid var(--border);border-radius:var(--r);max-height:180px;overflow-y:auto;margin-bottom:12px}
.log-entry{padding:10px 12px;border-bottom:1px solid var(--border)}
.log-entry:last-child{border-bottom:none}
.log-entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.log-agent{font-size:11px;font-weight:600;color:var(--gold)}
.log-time{font-size:10px;color:var(--text-muted)}
.log-text{font-size:11px;color:var(--text-dim);line-height:1.5}
.log-rerun{margin-top:5px;background:none;border:1px solid var(--border);color:var(--text-muted);padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s}
.log-rerun:hover{border-color:var(--gold-border);color:var(--gold)}
.log-empty{padding:16px 12px;font-size:11px;color:var(--text-muted);font-style:italic}
.apply-bar{display:flex;gap:8px;margin-bottom:14px}
.gen-bar{border-top:1px solid var(--border);padding-top:14px}
.gen-bar-label{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-label);text-transform:uppercase;margin-bottom:8px}
.quality-row{display:flex;gap:6px;margin-bottom:10px}
.q-btn{padding:5px 12px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card3);color:var(--text-muted);transition:all .15s;font-family:inherit}
.q-btn:hover{border-color:var(--border2);color:var(--text-dim)}
.q-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.gen-btn-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.gen-progress{margin-bottom:10px;display:none}
.gen-progress.show{display:block}
.gen-progress-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-bottom:4px}
.takes-wrap{margin-top:12px;display:none}
.takes-wrap.show{display:block}
.takes-tabs{display:flex;gap:4px;margin-bottom:8px}
.take-tab{padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--card3);color:var(--text-muted);transition:all .15s;font-family:inherit}
.take-tab.active{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.take-meta{font-size:10px;color:var(--text-muted);margin-bottom:8px}
.video-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;overflow:hidden}
.sec-gen-block{margin-top:28px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.sec-gen-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.sec-gen-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sec-gen-progress{margin-top:12px;display:none}
.sec-gen-progress.show{display:block}
.story-paste-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.story-paste-label{padding:10px 14px;font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-label);text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--card2)}
.story-textarea{width:100%;background:var(--card);border:none;color:var(--text);font-size:12px;padding:16px;resize:vertical;min-height:200px;font-family:'Courier New',monospace;line-height:1.7}
.story-textarea:focus{outline:none}
.story-actions{display:flex;gap:10px;padding:12px 14px;border-top:1px solid var(--border);background:var(--card2)}
.story-btn{padding:8px 18px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--card3);color:var(--text-dim);transition:all .15s;font-family:inherit}
.story-btn:hover{color:var(--text)}
.story-btn.continue:hover{border-color:var(--gold-border);color:var(--gold)}
.story-meta-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.story-meta-title{font-size:16px;font-weight:700}
.story-tag{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--card3);border:1px solid var(--border);color:var(--text-muted);letter-spacing:.04em}
.crew-run-block{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px}
.crew-run-title{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.crew-run-title .star{color:var(--gold)}
.crew-run-desc{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:14px}
.crew-run-actions{display:flex;gap:10px;align-items:center}
.crew-btn{padding:8px 18px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--card3);color:var(--text-dim);transition:all .15s;font-family:inherit}
.crew-btn:hover{color:var(--text)}
.crew-btn.gold{background:var(--gold);border-color:var(--gold);color:#000}
.crew-btn.gold:hover{background:#E8BC55}
.final-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.final-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.final-stat-val{font-size:26px;font-weight:700;color:var(--gold)}
.final-stat-val.green{color:var(--green)}
.final-stat-val.red{color:var(--red)}
.final-stat-lbl{font-size:10px;color:var(--text-muted);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
#lib-panel{display:none;position:fixed;top:0;right:0;bottom:0;width:400px;background:#0A0A0A;border-left:1px solid var(--border);z-index:100;flex-direction:column;box-shadow:-12px 0 40px rgba(0,0,0,.6)}
#lib-panel.open{display:flex}
.lib-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.lib-title{font-size:14px;font-weight:700}
.lib-close{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px;transition:color .15s;font-family:inherit}
.lib-close:hover{color:var(--text)}
.lib-filters{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.lib-filter{padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--text-muted);transition:all .15s;font-family:inherit}
.lib-filter.active{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.lib-list{flex:1;overflow-y:auto;padding:12px 20px}
.lib-item{padding:12px 0;border-bottom:1px solid var(--border)}
.lib-item:last-child{border-bottom:none}
.lib-item-id{font-weight:700;font-size:12px;color:var(--gold);margin-bottom:3px}
.lib-item-meta{font-size:10px;color:var(--text-muted);margin-bottom:8px}
.lib-item-actions{display:flex;gap:6px}
.lib-item-btn{padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--text-dim);transition:all .15s;font-family:inherit}
.lib-item-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.lib-empty{text-align:center;padding:40px 0;font-size:12px;color:var(--text-muted);font-style:italic}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card2);border:1px solid var(--gold-border);color:var(--text);padding:9px 18px;border-radius:var(--r);font-size:12px;z-index:200;transition:transform .25s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
</style>
<style>@keyframes agentPulse{0%,100%{box-shadow:0 0 0 0 rgba(250,204,21,.3);}50%{box-shadow:0 0 0 6px rgba(250,204,21,0);}}</style>
</head>
<body>
<div id="boot"><div id="boot-text">INITIALISING...</div><div id="boot-err"></div></div>
<nav id="sidebar">
  <div class="sb-project">
    <div class="sb-project-label">Project</div>
    <div class="sb-project-name" id="sb-project-name">London Calling</div>
  </div>
  <div class="sb-steps">
    <div class="sb-step done" onclick="showSec('story')" id="nav-story"><div class="sb-step-num">&#10003;</div><div class="sb-step-label">Story</div></div>
    <div class="sb-step active" onclick="showSec('generate')" id="nav-generate"><div class="sb-step-num">3</div><div class="sb-step-label">Generate</div><div class="sb-step-now">Now</div></div>
    <div class="sb-step" onclick="showSec('edit')" id="nav-edit"><div class="sb-step-num">4</div><div class="sb-step-label">Edit</div></div>
    <div class="sb-step" onclick="showSec('deliver')" id="nav-deliver"><div class="sb-step-num">5</div><div class="sb-step-label">Deliver</div></div>
  </div>
  <div class="sb-crew">
    <div class="sb-crew-label">Crew Activity<span class="sb-crew-count" id="crew-count">0 / 50</span></div>
    <div id="crew-agents"><div class="sb-crew-agent"><div class="sb-crew-dot"></div><span>Idle</span></div></div>
  </div>
  <div class="sb-footer">
    <div class="sb-footer-email">kyle@shotbreak.io</div>
    <div class="sb-footer-badge">legacy &#10003;</div>
  </div>
</nav>
<div id="main">
  <div id="topbar">
    <div class="topbar-meta" id="topbar-meta"><strong id="tb-clips">0</strong> clips across <strong id="tb-scenes">0</strong> scenes</div>
    <div class="topbar-actions">
      <button class="tb-btn" onclick="rerunSuggestions()">Re-run suggestions</button>
      <button class="tb-btn gold" onclick="redraftAllMasters()">&#8635; Redraft All Masters</button>
      <button class="tb-btn" onclick="expandAll()">&#9660; Expand all</button>
      <button class="tb-btn" onclick="collapseAll()">&#9658; Collapse all</button>
      <button class="tb-btn" onclick="toggleLib()">Library</button>
    </div>
  </div>
  <div id="content"></div>
</div>
<div id="lib-panel">

function clipCard(cid,sec){var k=key(cid),s=ST.shots[k]||{},locked=s.locked||false,min=s.minimized||false,agents=AGENTS[sec]||AGENTS.coverage,log=s.log||[],q=s.quality||'kling-3.0';var chips=agents.map(function(a){return '<button class="agent-chip" id="chip-'+k+'_'+a.replace(/\s+/g,'_')+'" onclick="selAg(\''+k+'\',\''+a+'\',\''+sec+'\')">'+'<div class="chip-progress"></div><span class="chip-label">'+a+'</span></button>';}).join('');var logH=log.length===0?'<div class="log-empty">No agent activity yet.</div>':log.slice(-5).reverse().map(function(e){return '<div class="log-entry"><div class="log-entry-top"><span class="log-agent">&#10022; '+e.agent+'</span><span class="log-time">'+fmt(e.ts)+'</span></div><div class="log-text">'+e.text+'</div><button class="log-rerun" onclick="rerunAg(\''+k+'\',\''+e.agent+'\',\''+sec+'\')">&crarr; Re-run</button></div>';}).join('');var qH=['kling-3.0','veo-3.1','wan-2.7','seedance-turbo'].map(function(v){return '<button class="q-btn '+(q===v?'active':'')+' " onclick="setQ(\''+k+'\',\''+v+'\',this)">'+qL(v)+'</button>';}).join('');var vids=s.videos||[];var takesH=vids.length>0?'<div class="takes-wrap show" id="takes-'+k+'"><div class="takes-tabs">'+vids.map(function(v,i){return '<button class="take-tab '+(i===0?'active':'')+' " onclick="swTake(\''+k+'\','+i+',this)">Take '+(i+1)+'</button>';}).join('')+'</div><div class="take-meta" id="take-meta-'+k+'">'+cid+' &middot; '+vids[0].quality+' &middot; '+fmt(vids[0].ts)+'</div><div class="video-box" id="vprev-'+k+'">'+(vids[0].url?'<video src="'+vids[0].url+'" controls style="width:100%;height:100%;border-radius:4px"></video>':'&#9654; Video ready')+'</div></div>':'<div class="takes-wrap" id="takes-'+k+'"></div>';if(locked){return '<div class="clip-card locked" id="card-'+k+'"><div class="clip-header"><div class="clip-id">'+cid+'</div>'+getShotLabel(cid)+'<div class="clip-inherit-label">LOCKED</div><div class="clip-header-actions"><button class="clip-btn lock-active" onclick="toggleLock(\''+k+'\')">&loz; Unlock</button></div></div></div>';}return '<div class="clip-card" id="card-'+k+'"><div class="clip-header"><div class="clip-id">'+cid+'</div>'+getShotLabel(cid)+'<div class="clip-header-actions"><button class="clip-btn" onclick="toggleMin(\''+k+'\')">'+(min?'&#9650; Expand':'&#9660; Minimize')+'</button><button class="clip-btn" onclick="toggleLock(\''+k+'\')">&loz; Lock</button></div></div><div class="clip-body'+(min?' hidden':'')+' " id="body-'+k+'"><div class="agent-stack"><div class="agent-stack-header"><div class="agent-stack-title">Crew</div><div style="font-size:10px;color:var(--text-muted)">'+agents.length+' agents</div></div><div class="agent-chips" id="chips-'+k+'">'+chips+'</div><div class="agent-run-row"><button class="run-btn primary" onclick="runAg(\''+k+'\',\''+sec+'\',false)">&#9654; Run this clip</button><button class="run-btn" onclick="runAllAgentsOnShot(\''+k+'\',\''+sec+'\')">&#9654;&#9654; Run all agents on this shot</button></div><div class="run-progress" id="rp-'+k+'"><div class="run-progress-text" id="rp-text-'+k+'">Running...</div><div class="pbar"><div class="pbar-fill" id="rp-fill-'+k+'" style="width:0%"></div></div></div></div>'+topFields(cid,s,sec)+'<div class="field-label-row" style="margin-bottom:6px"><div class="field-label">Agent Activity</div></div><div class="agent-log" id="log-'+k+'">'+logH+'</div><div class="apply-bar"><button class="run-btn primary" onclick="applyC(\''+k+'\')">&check; Apply Changes</button><button class="run-btn" onclick="undoC(\''+k+'\')">&larrhk; Undo</button></div><div class="gen-bar"><div class="gen-bar-label">Generate</div><div class="quality-row">'+qH+'</div><div class="dur-row" style="display:flex;gap:6px;margin-bottom:10px"><span style="font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--text-label);text-transform:uppercase;line-height:28px">Duration</span><select id="dur-'+k+'" class="q-btn" style="padding:4px 8px" onchange="setShotDur(\''+k+'\')"><option value="5">5s</option><option value="8">8s</option><option value="10">10s</option></select></div><div class="gen-btn-row"><button class="run-btn primary" onclick="genClip(\''+k+'\',\''+cid+'\')">&rsaquo; Generate this clip</button></div><div class="gen-progress" id="gp-'+k+'"><div class="gen-progress-row"><span id="gp-text-'+k+'">Generating...</span><span id="gp-eta-'+k+'"></span></div><div class="pbar"><div class="pbar-fill" id="gp-fill-'+k+'" style="width:0%"></div></div></div>'+takesH+'</div></div></div>';}
function topFields(cid,s,sec){

async function genClip(k,cid){
  if(!db){toast("Not connected");return;}
  var s=ST.shots[k]||{},_ta=document.getElementById('prompt-'+k),_tv=(_ta&&_ta.value||'').trim(),p=_tv||s.committedPrompt||s.currentPrompt||'';
  if(!p){toast("Add a prompt before generating");return;}
  var q=s.quality||'kling-3.0';
  var gp=document.getElementById("gp-"+k);
  var gf=document.getElementById("gp-fill-"+k);
  var gt=document.getElementById("gp-text-"+k);
  var ge=document.getElementById("gp-eta-"+k);
  if(gp)gp.classList.add("show");
  var pct=0,startT=Date.now(),est=60000;
  var iv=setInterval(function(){
    pct=Math.min(((Date.now()-startT)/est)*90,90);
    if(gf)gf.style.width=pct+"%";
    var rem=Math.max(0,Math.round((est-(Date.now()-startT))/1000));
    if(ge)ge.textContent="~"+rem+"s";
  },500);
  try{
    var url='';
    // Submit via server-side function (avoids CORS, keeps API key server-side)
    var submitRes=await fetch('/.netlify/functions/gen-clip',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:p,model:q})
    });
    if(!submitRes.ok){
      var errTxt=await submitRes.text().catch(function(){return submitRes.status;});
      console.error("gen-clip submit error",submitRes.status,errTxt);
      toast("Generation failed ("+submitRes.status+")");
      clearInterval(iv);
      if(gp)gp.classList.remove("show");
      return;
    }
    var submitData=await submitRes.json();
    var requestId=submitData.requestId;
    if(!requestId){
      toast("Generation failed: no request ID");
      clearInterval(iv);
      if(gp)gp.classList.remove("show");
      return;
    }
    // Poll gen-clip-status until completed or failed (max 90s)
    var maxPolls=30,pollInterval=3000;
    for(var i=0;i<maxPolls;i++){
      await sleep(pollInterval);
      try{
        var pollRes=await fetch('/.netlify/functions/gen-clip-status?id='+requestId);
        var pollData=await pollRes.json();
        var st=pollData.status;
        if(st==='completed'||st==='succeeded'){
          url=pollData.videoUrl||'';
          console.log('genClip completed -- videoUrl:',url,'full pollData:',JSON.stringify(pollData));
          if(!url) toast('Video done but no URL returned -- check console');
          break;
        }
        if(st==='failed'||st==='error'){
          console.error("Wavespeed generation failed",pollData);
          toast("Generation failed: "+(pollData.error||'unknown'));
          clearInterval(iv);
          if(gp)gp.classList.remove("show");
          return;
        }
        // still processing -- update ETA estimate
        est=Math.max(est,(i+1)*pollInterval*1.5);
      }catch(pe){
        console.warn("Poll error (transient)",pe);
      }
    }
    clearInterval(iv);
    if(gf)gf.style.width="100%";
    if(gt)gt.textContent="Complete";
    if(ge)ge.textContent='';
    var vids=(s.videos||[]).concat([{take:(s.videos||[]).length+1,quality:q,url:url,ts:new Date().toISOString(),section:curSec,clipId:cid}]);
    var vid={id:Date.now()+'',clipKey:k,clipId:cid,take:vids.length,quality:q,url:url,ts:new Date().toISOString(),section:curSec};
    db.ref("projects/"+PID+"/videos/"+vid.id).set(vid);
    if(ST.shots[k])ST.shots[k].videos=vids;
    var tw=document.getElementById("takes-"+k);
    if(tw){
      var tabsH=vids.map(function(v,i){
        return '<button class="take-tab '+(i===vids.length-1?'active':'')+' " onclick="swTake(\''+k+'\','+i+',this)">Take '+(i+1)+'</button>';
      }).join('');
      tw.innerHTML='<div class="takes-tabs">'+tabsH+'</div>'
        +'<div class="take-meta" id="take-meta-'+k+'">'+cid+' · '+qL(q)+' · '+fmt(new Date().toISOString())+'</div>'
        +'<div class="video-box" id="vprev-'+k+'">'
        +(url?'<video src="'+url+'" controls playsinline style="width:100%;display:block;border-radius:4px"></video><div style="padding:4px 8px;font-size:11px"><a href="'+url+'" target="_blank" style="color:var(--accent)">⬇ Open / download</a></div>':'<span style="opacity:.5">&#9654; Video ready (no URL)</span>')
        +'</div>';
      tw.classList.add("show");
    }
    setTimeout(function(){if(gp)gp.classList.remove("show");},2000);
    toast("Take "+vids.length+" generated"+(url?'':' (no video URL returned)'));
  }catch(e){
    clearInterval(iv);
    if(gp)gp.classList.remove("show");
    console.error("genClip error",e);
    toast("Generation failed");
  }
}

  if (tbClips) tbClips.textContent = totalClips;

async function reparseScript() {
  var btn   = document.getElementById('reparse-btn');
  var pctEl = document.getElementById('reparse-pct');
  var ta    = document.getElementById('story-script');
  if (!ta || !ta.value.trim()) { toast('Paste a script first'); return; }
  _parsing = true;
  saveScript(ta.value);

  if (btn) { btn.disabled = true; }
  if (pctEl) pctEl.textContent = '...';

  var grid = document.getElementById('script-breakdown-grid');
  if (grid) grid.innerHTML = '<div style="color:#888;font-size:13px;padding:12px;grid-column:1/-1;">Grok is reading your script...</div>';

  var p = 0;
  var iv = setInterval(function() {
    p = Math.min(p + Math.floor(Math.random() * 8) + 3, 88);
    if (pctEl) pctEl.textContent = p + '%';
  }, 400);

  try {
    var resp = await fetch('/.netlify/functions/parse-script', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ script: ta.value })
    });

    clearInterval(iv);

    if (!resp.ok) {
      var err = await resp.json().catch(function(){ return { error: 'Unknown error' }; });
      throw new Error(err.error || 'Parse failed (' + resp.status + ')');
    }

    var parsed = await resp.json();
    pctEl = document.getElementById('reparse-pct'); // re-grab live ref
    if (pctEl) pctEl.textContent = '100%';
    setTimeout(function() { var el=document.getElementById('reparse-pct'); if(el)el.textContent=''; }, 800);

    // Rebuild SCENES global from Grok response
    SCENES = parsed.scenes.map(function(sc) {
      return {
        id: sc.id,
        name: sc.name,
        clips: sc.shots.map(function(sh) { return sh.id; }),
        shots: sc.shots,
        description: sc.description || '',
        // Store scene-level production details
        intExt: sc.intExt || '',
        locationDesc: sc.locationDesc || '',
        timePeriod: sc.timePeriod || '',
        atmosphere: sc.atmosphere || '',
        props: sc.props || '',
        characters: sc.characters || []
      };
    });

    // Rebuild ST.shots — pre-populate cast fields from Grok data
    var newShots = {};
    SCENES.forEach(function(sc) {
      // Build a lookup: shotId -> shot object (has per-shot characters if prompt returns them)
      var shotLookup = {};
      (sc.shots || []).forEach(function(sh) { shotLookup[sh.id] = sh; });

      sc.clips.forEach(function(c) {
        // c is a shot ID like "S1.1" -- find the matching shot object
        var shotObj = shotLookup[c] || {};

        // Per-shot characters (if Grok returned them) take priority over scene-level
        var shotChars = shotObj.characters || null;

        // If no per-shot characters, infer from shot description:
        // only include scene characters whose name appears in the shot description
        if (!shotChars) {
          var desc = (shotObj.description || '').toLowerCase();
          if (desc) {
            shotChars = (sc.characters || []).filter(function(ch) {
              var nm = (ch.name || '').toLowerCase();
              return nm && desc.indexOf(nm.toLowerCase()) >= 0;
            });
          }
        }

        // Final fallback: if shot description mentions no named characters AND
        // the scene has speaking characters (dialogue scenes), use scene chars.
        // But for pure action/establishing shots with no character mention, leave blank.
        var primaryChar = (shotChars && shotChars.length) ? shotChars[0] : {};
        var allCharNames = (shotChars && shotChars.length)
          ? shotChars.map(function(c){ return c.name; }).join(', ')
          : '';

        newShots[key(c)] = {
          sceneId: sc.id, clipId: c, locked: false, minimized: false,
          currentPrompt: shotObj.description||'', committedPrompt: shotObj.description||'', bg: '',
          fields: {
            characterName: primaryChar.name || allCharNames || '',
            role: primaryChar.role || '',
            physicalDesc: primaryChar.physicalDesc || '',
            wardrobe: primaryChar.wardrobe || '',
            makeup: primaryChar.makeup || '',
            // Location fields — from scene
            locationName: sc.name || '',
            intExt: sc.intExt || '',
            locationDesc: sc.locationDesc || '',
            timePeriod: sc.timePeriod || '',
            atmosphere: sc.atmosphere || '',
            props: sc.props || ''
          },
          log: [], videos: [], quality: 'kling-3.0'
        };
      });
    });
    ST.shots = newShots;

    // Persist to Firebase
    if (db) {
      db.ref("projects/"+PID+"/scenes").set(SCENES);
      db.ref("projects/"+PID+"/shots").set(newShots);
    }

    // Update meta tags
    var titleEl = document.querySelector('.story-meta-title');
    if (titleEl) titleEl.textContent = parsed.title || '(Untitled)';
    var tags = document.querySelectorAll('.story-tag');
    window._charCount = (parsed.characters || []).length;
    var tagVals = ['screenplay', parsed.scenes.length + ' scenes', window._charCount + ' characters'];
    tags.forEach(function(t, i) { if (tagVals[i]) t.textContent = tagVals[i]; });

    // Render breakdown
    renderScriptBreakdown(SCENES);

    // Re-render current section so Cast/Coverage/Vision pick up new data immediately
    if (curSec !== 'story') {
      renderSec(curSec);
    }

    updateTopbar();
    toast('Parsed ' + parsed.scenes.length + ' scenes — Cast & Places pre-filled');

  } catch(e) {
    clearInterval(iv);
    if (pctEl) pctEl.textContent = '';
    if (grid) grid.innerHTML = '<div style="color:#f87171;font-size:13px;padding:12px;grid-column:1/-1;">Error: ' + e.message + '</div>';
    toast('Parse failed: ' + e.message);
  } finally {
    _parsing = false;
    // Re-grab live DOM refs in case syncUI re-rendered during parse
    var liveBtn = document.getElementById('reparse-btn');
    if (liveBtn) liveBtn.disabled = false;
  }
}

function parseScriptText(raw) {
  var lines = raw.split(/\r?\n/);
  var scenes = [];
  var currentScene = null;
  var sceneIdx = 0;
  var actionBuffer = [];

  // Detect Fountain scene headings: INT. / EXT. / INT/EXT or ALL-CAPS lines ending with location cues
  var sceneHeadingRe = /^(INT\.|EXT\.|INT\/EXT\.|I\/E\.)/i;
  // Also catch plain numbered headings like "SCENE 1" or "ACT ONE"
  var numberedRe = /^(SCENE\s+\d+|ACT\s+(ONE|TWO|THREE|FOUR|\d+))/i;

  function flushScene() {
    if (!currentScene) return;
    // Estimate shots: 1 shot per ~3 lines of action, minimum 1, max 12
    var actionLines = actionBuffer.filter(function(l) { return l.trim().length > 2; }).length;
    var shotCount = Math.max(1, Math.min(12, Math.ceil(actionLines / 3)));
    var clips = [];
    for (var i = 1; i <= shotCount; i++) {
      clips.push(currentScene.id + '.' + i);
    }
    currentScene.clips = clips;
    currentScene.shotCount = shotCount;
    currentScene.actionLines = actionLines;
    scenes.push(currentScene);
    actionBuffer = [];
  }

  lines.forEach(function(line) {
    var trimmed = line.trim();
    if (sceneHeadingRe.test(trimmed) || numberedRe.test(trimmed)) {
      flushScene();
      sceneIdx++;
      var sid = 'S' + sceneIdx;
      currentScene = { id: sid, name: trimmed.substring(0, 60), clips: [], rawHeading: trimmed };
    } else if (currentScene) {
      actionBuffer.push(trimmed);
    }
  });
  flushScene();

  // If no Fountain headings found, fall back: split on blank-line blocks
  if (scenes.length === 0) {
    var blocks = raw.split(/\n\s*\n/).filter(function(b) { return b.trim().length > 10; });
    blocks.forEach(function(block, i) {
      var sid = 'S' + (i + 1);
      var firstLine = block.trim().split('\n')[0].substring(0, 60);
      var actionLines = block.split('\n').filter(function(l) { return l.trim().length > 2; }).length;
      var shotCount = Math.max(1, Math.min(8, Math.ceil(actionLines / 4)));
      var clips = [];
      for (var j = 1; j <= shotCount; j++) { clips.push(sid + '.' + j); }
      scenes.push({ id: sid, name: firstLine, clips: clips, shotCount: shotCount, actionLines: actionLines });
    });
  }

  var totalShots = scenes.reduce(function(acc, sc) { return acc + sc.clips.length; }, 0);
  var chars = extractCharacters(raw);

  return { scenes: scenes, totalShots: totalShots, characters: chars };
}

function extractCharacters(raw) {
  // Character cues in Fountain: ALL CAPS line, not a scene heading, not a transition
  var lines = raw.split(/\r?\n/);
  var chars = {};
  var sceneRe = /^(INT\.|EXT\.|INT\/EXT\.)/i;
  var transRe = /^(FADE|CUT|DISSOLVE|SMASH)/i;
  lines.forEach(function(line) {
    var t = line.trim();
    if (t.length < 2 || t.length > 40) return;
    if (sceneRe.test(t) || transRe.test(t)) return;
    if (t === t.toUpperCase() && /[A-Z]/.test(t) && !/[.!?]$/.test(t)) {
      chars[t.replace(/\s*\(.*\)/, '').trim()] = true;
    }
  });
  return Object.keys(chars);
}

function updateStoryMeta(parsed) {
  var titleEl = document.querySelector('.story-meta-title');
  var tags = document.querySelectorAll('.story-tag');
  if (titleEl) {
    var ta = document.getElementById('story-script');
    var firstLine = ta ? ta.value.trim().split('\n')[0].substring(0, 40) : '(Untitled)';
    titleEl.textContent = firstLine || '(Untitled)';
  }
  var tagData = ['prose', parsed.scenes.length + ' scenes', parsed.characters.length + ' characters'];
  tags.forEach(function(tag, i) { if (tagData[i] !== undefined) tag.textContent = tagData[i]; });
}

function renderScriptBreakdown(scenes) {
  var grid = document.getElementById('script-breakdown-grid');
  if (!grid) return;
  if (!scenes || !scenes.length) {
    grid.innerHTML = '<div style="color:#555;font-size:13px;padding:8px;">No scenes detected.</div>';
    return;
  }
  grid.innerHTML = scenes.map(function(sc) {
    var shots = sc.shots || sc.clips.map(function(c) { return { id: c, type: 'Shot', description: '' }; });
    return '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:14px;">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">'
        + '<div style="font-weight:600;font-size:12px;color:#e0e0e0;line-height:1.4;max-width:75%;">' + sc.name + '</div>'
        + '<div style="font-size:10px;color:#555;background:#222;border-radius:4px;padding:2px 6px;">' + sc.id + '</div>'
      + '</div>'
      + (sc.description ? '<div style="font-size:11px;color:#666;margin-bottom:8px;line-height:1.4;">' + sc.description + '</div>' : '')
      + '<div style="font-size:11px;color:#888;margin-bottom:10px;">' + shots.length + ' shot' + (shots.length !== 1 ? 's' : '') + '</div>'
      + '<div style="display:flex;flex-direction:column;gap:5px;">'
        + shots.map(function(sh) {
            return '<div style="display:flex;align-items:flex-start;gap:8px;background:#222;border-radius:5px;padding:6px 8px;">'
              + '<div style="font-size:10px;color:#facc15;font-weight:600;white-space:nowrap;min-width:36px;">' + sh.id + '</div>'
              + '<div style="flex:1;">'
                + '<div style="font-size:10px;color:#60a5fa;margin-bottom:2px;">' + (sh.type || '') + '</div>'
                + '<div style="font-size:11px;color:#aaa;line-height:1.3;">' + (sh.description || '') + '</div>'
              + '</div>'
              + '</div>';
          }).join('')
      + '</div>'
      + '</div>';
  }).join('');
}

async function runCrew(sec) {
  var agents = AGENTS[sec] || [];
  if (!agents.length) { toast("No agents for this section"); return; }
  if (!SCENES || !SCENES.length) { toast("Parse a script first"); return; }
  toast("Running " + agents.length + " agents...");
  for (var i = 0; i < agents.length; i++) {
    await runSingleAgent(agents[i], sec);
    await sleep(300);
  }
  toast("Full crew done!");
}

function renderBreakdown(){
  var grid=document.getElementById('scene-breakdown-grid');
  if(!grid)return;
  if(!window.ST||!ST.shots||!Object.keys(ST.shots).length){
    grid.innerHTML='<div style="color:#555;font-size:13px;padding:8px;">No shot data yet — run crew to populate.</div>';
    return;
  }
  var shots=Object.values(ST.shots);
  var byScene={};
  shots.forEach(function(s){
    var sc=s.scene||'Unknown';
    if(!byScene[sc])byScene[sc]={total:0,locked:0,video:0};
    byScene[sc].total++;
    if(s.locked)byScene[sc].locked++;
    if(s.videos&&s.videos.length>0)byScene[sc].video++;
  });
  var keys=Object.keys(byScene).sort();
  if(!keys.length){grid.innerHTML='<div style="color:#555;font-size:13px;">No scenes found.</div>';return;}
  grid.innerHTML=keys.map(function(sc){
    var d=byScene[sc];
    var lp=d.total?Math.round(d.locked/d.total*100):0;
    var vp=d.total?Math.round(d.video/d.total*100):0;
    return '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:14px;">'
      +'<div style="font-weight:600;font-size:13px;margin-bottom:6px;color:#e0e0e0;">'+sc+'</div>'
      +'<div style="font-size:12px;color:#888;margin-bottom:10px;">'+d.total+' clips</div>'
      +'<div style="margin-bottom:8px;">'
        +'<div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-bottom:3px;"><span>Locked</span><span>'+lp+'%</span></div>'
        +'<div style="background:#2a2a2a;border-radius:4px;height:6px;"><div style="background:#4ade80;height:6px;border-radius:4px;width:'+lp+'%;"></div></div>'
      +'</div>'
      +'<div>'
        +'<div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-bottom:3px;"><span>Video</span><span>'+vp+'%</span></div>'
        +'<div style="background:#2a2a2a;border-radius:4px;height:6px;"><div style="background:#60a5fa;height:6px;border-radius:4px;width:'+vp+'%;"></div></div>'
      +'</div>'
      +'</div>';
  }).join('');
}

var STORY_AGENT_STATE = {};

function renderAgentProgress() {
  var grid = document.getElementById('agent-progress-grid');
  if (!grid) return;
  var agents = (window.AGENTS && AGENTS.story) ? AGENTS.story : [
    "Vision Director","Scene Architect","Beat Sheet Architect","Logline Refiner",
    "Tone Guardian","Genre Interpreter","Premise Expander","Creative Prompt Writer",
    "Research Specialist","World Builder","Continuity Supervisor","Emotional Truth Guardian"
  ];
  grid.innerHTML = agents.map(function(name) {
    var s = STORY_AGENT_STATE[name] || {pct:0, status:'idle'};
    var pct = s.pct || 0;
    var isActive = s.status === 'active';
    var isDone   = s.status === 'done';
    var borderCol = isActive ? '#facc15' : isDone ? '#4ade80' : '#2a2a2a';
    var barCol    = isDone ? '#4ade80' : isActive ? '#facc15' : '#333';
    var statusTxt = isDone ? 'Done' : isActive ? 'Running...' : 'Idle';
    var statusCol = isDone ? '#4ade80' : isActive ? '#facc15' : '#555';
    var pulse     = isActive ? 'animation:agentPulse 1.4s ease-in-out infinite;' : '';
    return '<div style="background:#1a1a1a;border:1px solid '+borderCol+';border-radius:8px;padding:12px;'+pulse+'">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'
        + '<div style="font-size:12px;font-weight:600;color:#e0e0e0;line-height:1.3;">'+name+'</div>'
        + '<div style="font-size:10px;color:'+statusCol+';white-space:nowrap;margin-left:6px;">'+statusTxt+'</div>'
      + '</div>'
      + '<div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px;">'
        + '<span>Progress</span><span style="color:'+statusCol+';">'+pct+'%</span>'
      + '</div>'
      + '<div style="background:#2a2a2a;border-radius:4px;height:5px;">'
        + '<div style="background:'+barCol+';height:5px;border-radius:4px;width:'+pct+'%;transition:width .35s ease;"></div>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ── AGENT SYSTEM ─────────────────────────────────────────────────────────────
// agentState: { [agentName]: { status:'idle'|'running'|'done'|'error', activity:'', upgrades:[], pct:0 } }
var agentState = {};
var pendingUpgrades = {}; // { upgradeId: {shotId, field, current, proposed, reason, agentName} }
var upgradeIdCounter = 0;

function agentKey(name) { return name.replace(/[^a-zA-Z0-9]/g,'_'); }

function initAgentState(sec) {
  (AGENTS[sec]||[]).forEach(function(name) {
    if (!agentState[name]) agentState[name] = { status:'idle', activity:'', upgrades:[], pct:0 };
  });
}

function renderAgentGrid(sec) {
  var grid = document.getElementById('agent-progress-grid');
  if (!grid) return;
  // Inject Run All button above the grid (once per section)
  var hdrId = 'run-all-hdr-' + sec;
  if (!document.getElementById(hdrId)) {
    var hdr = document.createElement('div');
    hdr.id = hdrId;
    hdr.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;';
    var lbl = document.createElement('span');
    lbl.style.cssText = 'font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.08em;';
    lbl.textContent = 'Agents';
    var btn = document.createElement('button');
    btn.id = 'run-all-btn-' + sec;
    btn.setAttribute('data-sec', sec);
    btn.style.cssText = 'background:#1a2a1a;border:1px solid #2a5a2a;border-radius:4px;color:#4ade80;font-size:10px;padding:4px 10px;cursor:pointer;font-weight:600;';
    btn.innerHTML = '&#9654;&#9654; Run All';
    btn.addEventListener('click', function() { runAllAgents(this.getAttribute('data-sec')); });
    hdr.appendChild(lbl);
    hdr.appendChild(btn);
    grid.parentNode.insertBefore(hdr, grid);
  }
  initAgentState(sec);
  var agents = AGENTS[sec] || [];
  grid.innerHTML = agents.map(function(name) {
    var st = agentState[name] || { status:'idle', activity:'', upgrades:[], pct:0 };
    var statusColor = st.status==='done' ? '#4ade80' : st.status==='running' ? '#facc15' : st.status==='error' ? '#f87171' : '#555';
    var statusLabel = st.status==='done' ? 'Done' : st.status==='running' ? 'Running...' : st.status==='error' ? 'Error' : 'Idle';
    var pct = st.pct || 0;
    var pendingCount = Object.values(pendingUpgrades).filter(function(u){ return u.agentName===name && !u.resolved; }).length;
    return '<div id="agent-card-'+agentKey(name)+'" style="background:#111;border:1px solid '+(st.status==='running'?'#facc15':'#1e1e1e')+';border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:6px;">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;">'
        + '<div style="font-size:11px;font-weight:600;color:#e0e0e0;line-height:1.3;flex:1;">' + name + '</div>'
        + '<div style="font-size:10px;color:'+statusColor+';font-weight:600;white-space:nowrap;margin-left:6px;">' + statusLabel + '</div>'
      + '</div>'
      + '<div style="font-size:10px;color:#555;min-height:28px;line-height:1.4;">' + (st.activity || (st.status==='idle'?'Click ▶ to run':'')) + '</div>'
      + '<div style="background:#1a1a1a;border-radius:3px;height:3px;overflow:hidden;">'
        + '<div style="background:'+statusColor+';height:100%;width:'+pct+'%;transition:width .3s;"></div>'
      + '</div>'
      + '<div style="display:flex;gap:6px;align-items:center;margin-top:2px;">'
        + '<button onclick="runSingleAgent(\'"+ name +"\',\'"+ sec +"\')" style="flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;color:#aaa;font-size:10px;padding:4px 0;cursor:pointer;" '+(st.status==='running'?'disabled':'')+'>&#9654; Run</button>'
        + (st.status==='error' ? '<button onclick="runSingleAgent(\'"+ name +"\',\'"+ sec +"\')" style="flex:1;background:#2a1a1a;border:1px solid #6a2a2a;border-radius:4px;color:#f87171;font-size:10px;padding:4px 0;cursor:pointer;">&#8635; Retry</button>' : '')
        + (pendingCount > 0 ? '<button onclick="showUpgradesForAgent(\'"+ name +"\')" style="flex:1;background:#14532d;border:1px solid #4ade80;border-radius:4px;color:#4ade80;font-size:10px;padding:4px 0;cursor:pointer;font-weight:700;">&#10003; '+ pendingCount +' upgrade'+(pendingCount!==1?'s':'')+' ›</button>' : '')
      + '</div>'
    + '</div>';
  }).join('');
}

function updateAgentCard(name, sec) {
  var card = document.getElementById('agent-card-' + agentKey(name));
  if (!card) { renderAgentGrid(sec); return; }
  var st = agentState[name] || { status:'idle', activity:'', upgrades:[], pct:0 };
  var statusColor = st.status==='done' ? '#4ade80' : st.status==='running' ? '#facc15' : st.status==='error' ? '#f87171' : '#555';
  var statusLabel = st.status==='done' ? 'Done' : st.status==='running' ? 'Running...' : st.status==='error' ? 'Error' : 'Idle';
  var pct = st.pct || 0;
  var pendingCount = Object.values(pendingUpgrades).filter(function(u){ return u.agentName===name && !u.resolved; }).length;

// Mutex to prevent concurrent Grok calls
var _promptLock = false;
var _promptQueue = [];
function acquireLock(fn) {
  if (!_promptLock) { _promptLock = true; fn(); }
  else { _promptQueue.push(fn); }
}
function releaseLock() {
  _promptLock = false;
  if (_promptQueue.length) { var next = _promptQueue.shift(); _promptLock = true; next(); }
}
async function runAllAgents(sec) {
  var agents = AGENTS[sec] || [];
  if (!agents.length) { toast('No agents for this section'); return; }
  var btn = document.getElementById('run-all-btn-' + sec);
  if (btn) { btn.disabled = true; btn.textContent = 'Running...'; }
  window._runAllSuppressPanel = true;
  var errors = 0;
  for (var i = 0; i < agents.length; i++) {
    var name = agents[i];
    if (btn) btn.textContent = 'Running ' + (i+1) + '/' + agents.length + '...';
    try { await runSingleAgent(name, sec); }
    catch(e) { errors++; }
  }
  window._runAllSuppressPanel = false;
  if (btn) { btn.disabled = false; btn.textContent = errors ? ('Run All (' + errors + ' errors)') : '▶▶ Run All'; }
  var totalUpgrades = Object.values(pendingUpgrades).filter(function(u){ return !u.resolved; }).length;
  if (totalUpgrades > 0) {
    toast('All agents done — ' + totalUpgrades + ' upgrade' + (totalUpgrades!==1?'s':'') + ' ready');
    showAllPendingUpgrades();
  } else {
    toast(errors ? (errors + ' agent(s) failed') : 'All agents complete — no upgrades needed');
  }
}

// Run ALL agents for this section sequentially on a specific shot -- no auto-apply
async function runAllAgentsOnShot(k, sec) {
  var agents = AGENTS[sec] || [];
  if (!agents.length) { toast('No agents for this section'); return; }

  var card = document.getElementById('card-' + k);
  var btn  = card ? card.querySelector('button[onclick*="runAllAgentsOnShot"]') : null;
  if (btn) { btn.disabled = true; btn.textContent = 'Running...'; }

  var rpDiv  = document.getElementById('rp-' + k);
  var rpText = document.getElementById('rp-text-' + k);
  var rpFill = document.getElementById('rp-fill-' + k);
  if (rpDiv)  rpDiv.style.display = 'block';
  if (rpFill) rpFill.style.width  = '0%';

  window._runAllSuppressPanel = true;

  var errors = 0;
  for (var i = 0; i < agents.length; i++) {
    var agentName = agents[i];
    if (rpText) rpText.textContent = 'Agent ' + (i + 1) + '/' + agents.length + ': ' + agentName + '...';
    if (rpFill) rpFill.style.width = Math.round((i / agents.length) * 100) + '%';
    try { await runSingleAgent(agentName, sec); }
    catch(e) { errors++; }
    if (rpFill) rpFill.style.width = Math.round(((i + 1) / agents.length) * 100) + '%';
  }

  window._runAllSuppressPanel = false;

  if (rpText) rpText.textContent = errors
    ? (errors + ' agent(s) failed — see panel')
    : 'All ' + agents.length + ' agents done — review upgrades →';
  if (btn) { btn.disabled = false; btn.innerHTML = '&#9654;&#9654; Run all agents on this shot'; }

  showAllPendingUpgrades();
  toast(errors
    ? (errors + ' agent(s) failed')
    : 'All agents complete — ' + Object.values(pendingUpgrades).filter(function(u){ return !u.resolved; }).length + ' upgrades ready');
}

async function runSingleAgent(name, sec) {
  if (!SCENES || !SCENES.length) { toast('Parse a script first'); return; }
  if (!agentState[name]) agentState[name] = { status:'idle', activity:'', upgrades:[], pct:0 };
  agentState[name].status = 'running';
  agentState[name].activity = 'Contacting Grok...';
  agentState[name].pct = 10;
  updateAgentCard(name, sec);

  // Animate progress while waiting
  var pct = 10;
  var iv = setInterval(function() {
    pct = Math.min(pct + Math.floor(Math.random()*8)+3, 88);
    agentState[name].pct = pct;
    var bar = document.querySelector('#agent-card-'+agentKey(name)+' div[style*="transition"]');
    if (bar) bar.style.width = pct + '%';
  }, 500);

  try {
    var resp = await fetch('/.netlify/functions/run-agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agentName: name, scenes: SCENES, shots: ST.shots, section: sec })
    });

    clearInterval(iv);

    if (!resp.ok) {
      var errData = await resp.json().catch(function(){ return { error: 'Unknown error' }; });
      throw new Error(errData.error || 'Agent failed (' + resp.status + ')');
    }

    var data = await resp.json();
    console.log('[agent]', name, '-> upgrades:', (data.upgrades||[]).length, data);
    agentState[name].status = 'done';
    agentState[name].activity = data.activity || 'Analysis complete.';
    agentState[name].pct = 100;
    agentState[name].upgrades = data.upgrades || [];

    // Register pending upgrades
    (data.upgrades || []).forEach(function(u) {
      var uid = 'upg_' + (++upgradeIdCounter);
      pendingUpgrades[uid] = {
        id: uid,
        agentName: name,
        shotId: u.shotId,
        field: u.field,
        current: u.current,
        proposed: u.proposed,
        reason: u.reason,
        resolved: false
      };
    });

    updateAgentCard(name, sec);
    if (data.upgrades && data.upgrades.length > 0) {
      toast(name + ': ' + data.upgrades.length + ' upgrade' + (data.upgrades.length!==1?'s':'') + ' ready — click to review');
      // Auto-open upgrade panel so user sees Apply buttons immediately
      showUpgradesForAgent(name);
    } else {
      toast(name + ': no upgrades needed');
    }

  } catch(e) {
    clearInterval(iv);
    agentState[name].status = 'error';
    agentState[name].activity = 'Error: ' + e.message;
    agentState[name].pct = 0;
    updateAgentCard(name, sec);
    toast(name + ' failed: ' + e.message);
  }
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function applyUpgrade(uid) {
  var u = pendingUpgrades[uid];
  if (!u) return;
  // Find the shot and apply the field
  var shotKey = null;
  Object.keys(ST.shots).forEach(function(k) {
    if (ST.shots[k].clipId === u.shotId || k === u.shotId.replace('.','_')) shotKey = k;
  });
  if (shotKey) {
    if (!ST.shots[shotKey].fields) ST.shots[shotKey].fields = {};
    if (u.field === 'currentPrompt') {
      ST.shots[shotKey].currentPrompt = u.proposed;
    } else {
      ST.shots[shotKey].fields[u.field] = u.proposed;
    }
    // Persist to Firebase
    if (db) db.ref('projects/'+PID+'/shots/'+shotKey).set(ST.shots[shotKey]);
  }
  u.resolved = true;
  // Remove card from panel
  var card = document.getElementById('upg-card-'+uid);
  if (card) { card.style.opacity='0.4'; card.style.pointerEvents='none'; setTimeout(function(){ if(card.parentNode) card.parentNode.removeChild(card); updateAgentCard(u.agentName, curSec); }, 400); }
  toast('Applied: ' + u.field + ' on ' + u.shotId);
}

function declineUpgrade(uid) {
  var u = pendingUpgrades[uid];
  if (!u) return;
  u.resolved = true;
  var card = document.getElementById('upg-card-'+uid);
  if (card) { card.style.opacity='0.3'; card.style.pointerEvents='none'; setTimeout(function(){ if(card.parentNode) card.parentNode.removeChild(card); updateAgentCard(u.agentName, curSec); }, 300); }
}

function applyAllUpgrades(agentName) {
  Object.keys(pendingUpgrades).forEach(function(uid) {
    var u = pendingUpgrades[uid];
    if ((agentName === null || u.agentName === agentName) && !u.resolved) applyUpgrade(uid);
  });
  setTimeout(function(){
    if (agentName === null) showAllPendingUpgrades();
    else showUpgradesForAgent(agentName);
  }, 500);
}

function declineAllUpgrades(agentName) {
  Object.keys(pendingUpgrades).forEach(function(uid) {
    var u = pendingUpgrades[uid];
    if ((agentName === null || u.agentName === agentName) && !u.resolved) declineUpgrade(uid);
  });
  setTimeout(function(){
    if (agentName === null) showAllPendingUpgrades();
    else showUpgradesForAgent(agentName);

}

    +'</div>';

  var badge = pending.length > 0 ? ' <span style="background:#facc15;color:#000;border-radius:10px;font-size:9px;padding:1px 6px;font-weight:700;">'+pending.length+'</span>' : '';

  return '<div class="changes-box" id="changes-box-'+k+'" style="margin-top:14px;border:1px solid #1e1e1e;border-radius:8px;overflow:hidden;">'
    +'<div style="background:#111;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleChangesBox(\''+k+'\');">'
      +'<div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;">Changes'+badge+'</div>'
      +'<div id="changes-chevron-'+k+'" style="color:#444;font-size:12px;">'+(pending.length>0?'&#9650;':'&#9660;')+'</div>'
    +'</div>'
    +'<div id="changes-body-'+k+'" style="padding:10px 12px;display:'+(pending.length>0?'block':'none')+'">'
      +pendingHTML+resolvedHTML
    +'</div>'
  +'</div>';
}

function addExtraChar(k) {
  var sel = document.getElementById('add-char-sel-'+k);
  if (!sel || !sel.value) return;
  var name = sel.value;
  var s = ST.shots[k];
  if (!s) return;
  var sceneChars = s.sceneCharacters || [];
  var charData = sceneChars.find(function(c){ return c.name === name; }) || { name: name };
  if (!s.extraCharacters) s.extraCharacters = [];
  s.extraCharacters.push(charData);
  if (db) db.ref('projects/'+PID+'/shots/'+k+'/extraCharacters').set(s.extraCharacters);
  // Re-render the clip card
  var card = document.getElementById('card-'+k);
  if (card) card.outerHTML = clipCard(s.clipId, curSec);
  // Re-attach card
  renderSec(curSec);
}

function removeExtraChar(k, idx) {
  var s = ST.shots[k];
  if (!s || !s.extraCharacters) return;
  s.extraCharacters.splice(idx, 1);
  if (db) db.ref('projects/'+PID+'/shots/'+k+'/extraCharacters').set(s.extraCharacters);
  renderSec(curSec);
}

function updExtraCharField(k, fk, val) {
  // fk format: extraChar_0_name, extraChar_0_role, etc.
  var parts = fk.split('_');
  var idx = parseInt(parts[1]);
  var field = parts.slice(2).join('_');
  var s = ST.shots[k];
  if (!s || !s.extraCharacters || !s.extraCharacters[idx]) return;
  s.extraCharacters[idx][field] = val;
  if (db) db.ref('projects/'+PID+'/shots/'+k+'/extraCharacters/'+idx).set(s.extraCharacters[idx]);
}

function toggleChangesBox(k) {
  var body = document.getElementById('changes-body-'+k);
  var chev = document.getElementById('changes-chevron-'+k);
  if (!body) return;
  var open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.innerHTML = open ? '&#9660;' : '&#9650;';
}

// Apply a change to the shot fields + rewrite the prompt
async function approveChange(k, cid, sec, btn) {
  var s = ST.shots[k];
  if (!s) return;
  var change = (s.changesLog||[]).find(function(c){ return c.id===cid; });
  if (!change) return;

  // Disable buttons while processing
  if (btn) { btn.disabled=true; btn.textContent='Rewriting...'; }

  // Apply the field change
  if (!s.fields) s.fields = {};
  if (change.field === 'currentPrompt') {
    s.currentPrompt = change.proposed;
  } else {
    s.fields[change.field] = change.proposed;
  }
  change.status = 'approved';

  // Rewrite the prompt to incorporate the change
  try {
    var rewriteResp = await fetch('/.netlify/functions/rewrite-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        currentPrompt: s.currentPrompt || '',
        fields: s.fields,
        changedField: change.field,
        changedValue: change.proposed,
        agentName: change.agentName
      })
    });
    if (rewriteResp.ok) {
      var rw = await rewriteResp.json();
      if (rw.prompt) {
        s.currentPrompt = rw.prompt;
        var ta = document.getElementById('prompt-'+k);
        if (ta) ta.value = rw.prompt;
      }
    }
  } catch(e) { /* prompt rewrite failed — field still applied */ }

  // Persist
  if (db) db.ref('projects/'+PID+'/shots/'+k).set(s);

  // Refresh the changes box
  var box = document.getElementById('changes-box-'+k);
  if (box) box.outerHTML = buildChangesBox(k, s);

  toast('Applied: '+change.field+' on '+s.clipId);
}

function declineChange(k, cid, btn) {
  var s = ST.shots[k];
  if (!s) return;
  var change = (s.changesLog||[]).find(function(c){ return c.id===cid; });
  if (!change) return;
  change.status = 'declined';
  if (db) db.ref('projects/'+PID+'/shots/'+k+'/changesLog').set(s.changesLog);
  var box = document.getElementById('changes-box-'+k);
  if (box) box.outerHTML = buildChangesBox(k, s);
}

// Called by the agent system when it has upgrades for a specific shot
function queueShotChange(shotId, agentName, field, current, proposed, reason) {
  var k = shotId.replace('.','_');
  var s = ST.shots[k];
  if (!s) return;
  if (!s.changesLog) s.changesLog = [];
  var cid = 'chg_'+(Date.now())+'_'+(Math.random()*1000|0);
  s.changesLog.push({ id:cid, agentName:agentName, field:field, current:current, proposed:proposed, reason:reason, status:'pending', ts:Date.now() });
  if (db) db.ref('projects/'+PID+'/shots/'+k+'/changesLog').set(s.changesLog);
  // Refresh changes box if visible
  var box = document.getElementById('changes-box-'+k);
  if (box) box.outerHTML = buildChangesBox(k, s);
  // Update badge on changes header
  var badge = document.querySelector('#changes-box-'+k+' span[style*="facc15"]');
}


// Override the agent upgrade routing to push to per-shot changes boxes
var _origRunSingleAgent = runSingleAgent;
runSingleAgent = async function(name, sec) {
  if (!SCENES || !SCENES.length) { toast('Parse a script first'); return; }
  if (!agentState[name]) agentState[name] = { status:'idle', activity:'', upgrades:[], pct:0 };
  agentState[name].status = 'running';
  agentState[name].activity = 'Contacting Grok...';
  agentState[name].pct = 10;
  updateAgentCard(name, sec);

  var pct = 10;
  var iv = setInterval(function() {
    pct = Math.min(pct + Math.floor(Math.random()*8)+3, 88);
    agentState[name].pct = pct;
    var bar = document.querySelector('#agent-card-'+agentKey(name)+' div[style*="transition"]');
    if (bar) bar.style.width = pct + '%';
  }, 500);

  try {
    var resp = await fetch('/.netlify/functions/run-agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agentName: name, scenes: SCENES, shots: ST.shots, section: sec })
    });
    clearInterval(iv);
    if (!resp.ok) {
      var errData = await resp.json().catch(function(){ return { error: 'Unknown error' }; });
      throw new Error(errData.error || 'Agent failed (' + resp.status + ')');
    }
    var data = await resp.json();
    agentState[name].status = 'done';
    agentState[name].activity = data.activity || 'Analysis complete.';
    agentState[name].pct = 100;
    agentState[name].upgrades = data.upgrades || [];

    // Route each upgrade to the per-shot changes box
    (data.upgrades || []).forEach(function(u) {
      queueShotChange(u.shotId, name, u.field, u.current, u.proposed, u.reason);
    });

    updateAgentCard(name, sec);
    if (data.upgrades && data.upgrades.length > 0) {
      toast(name + ': ' + data.upgrades.length + ' change' + (data.upgrades.length!==1?'s':'') + ' queued on shots');
    } else {
      toast(name + ': no changes needed');
    }
  } catch(e) {
    clearInterval(iv);
    agentState[name].status = 'error';
    agentState[name].activity = 'Error: ' + e.message;
    agentState[name].pct = 0;
    updateAgentCard(name, sec);
    toast(name + ' failed: ' + e.message);
  }
};

// Single init call
init();

// ═══════════════════════════════════════════════════════════════════
// CHARACTER BIBLE
// ═══════════════════════════════════════════════════════════════════

function buildCharacterBible(scenes) {
  CHARACTER_BIBLE = {};
  (scenes || []).forEach(function(sc) {
    (sc.characters || []).forEach(function(ch) {
      var nm = (typeof ch === 'string' ? ch : (ch.name || '')).trim();
      if (!nm) return;
      var bkey = nm.toUpperCase();
      if (!CHARACTER_BIBLE[bkey]) {
        CHARACTER_BIBLE[bkey] = {
          name: nm,
          role: (typeof ch === 'object' && ch.role) || '',
          physicalDesc: (typeof ch === 'object' && ch.physicalDesc) || '',
          wardrobe: (typeof ch === 'object' && ch.wardrobe) || '',
          makeup: (typeof ch === 'object' && ch.makeup) || '',
          personality: '',
          backstory: '',
          notes: '',
          imageUrl: ''
        };
      } else {
        var b = CHARACTER_BIBLE[bkey];
        if (!b.role && typeof ch === 'object' && ch.role) b.role = ch.role;
        if (!b.physicalDesc && typeof ch === 'object' && ch.physicalDesc) b.physicalDesc = ch.physicalDesc;
        if (!b.wardrobe && typeof ch === 'object' && ch.wardrobe) b.wardrobe = ch.wardrobe;
        if (!b.makeup && typeof ch === 'object' && ch.makeup) b.makeup = ch.makeup;
      }
    });
  });
  if (curSec === 'cast') {
    var el = document.getElementById('character-bible-section');
    if (el) el.outerHTML = renderCharacterBible();
  }
}

function updBible(bkey, field, value) {
  if (CHARACTER_BIBLE[bkey]) CHARACTER_BIBLE[bkey][field] = value;
}

function bibleInp(bkey, field, label, val) {
  var safe = (val||'').replace(/"/g,'&quot;');
  return '<div style="margin-bottom:7px;">'
    +'<div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">'+label+'</div>'
    +'<input type="text" value="'+safe+'" '
    +'style="width:100%;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:4px;color:#ccc;font-size:11px;padding:5px 8px;font-family:inherit;box-sizing:border-box;" '
    +'onchange="updBible(\'' + bkey + '\',\'' + field + '\',this.value)" /></div>';
}

function bibleTxa(bkey, field, label, val) {
  return '<div style="margin-bottom:7px;">'
    +'<div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">'+label+'</div>'
    +'<textarea rows="3" '
    +'style="width:100%;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:4px;color:#ccc;font-size:11px;padding:5px 8px;font-family:inherit;resize:vertical;box-sizing:border-box;" '
    +'onchange="updBible(\'' + bkey + '\',\'' + field + '\',this.value)">'+escF(val||'')+'</textarea></div>';
}

function renderCharacterBible() {
  var keys = Object.keys(CHARACTER_BIBLE);
  if (!keys.length) return '<div id="character-bible-section"></div>';

  var cards = keys.map(function(bkey) {
    var c = CHARACTER_BIBLE[bkey];
    var imgArea = c.imageUrl
      ? '<img src="'+c.imageUrl+'" style="width:100%;border-radius:6px;margin-bottom:10px;object-fit:cover;aspect-ratio:2/3;" />'
      : '<div style="width:100%;aspect-ratio:2/3;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;color:#2a2a2a;font-size:10px;letter-spacing:.04em;">NO IMAGE</div>';

    return '<div style="background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:14px;display:flex;flex-direction:column;">'
      +imgArea
      +'<div style="font-size:12px;font-weight:600;color:#e0e0e0;margin-bottom:10px;letter-spacing:.02em;">'+escF(c.name)+'</div>'
      +bibleInp(bkey,'role','Role / Function',c.role)
      +bibleTxa(bkey,'physicalDesc','Physical Description',c.physicalDesc)
      +bibleTxa(bkey,'wardrobe','Wardrobe',c.wardrobe)
      +bibleInp(bkey,'makeup','Makeup & Hair',c.makeup)
      +bibleTxa(bkey,'personality','Personality',c.personality)
      +bibleTxa(bkey,'backstory','Backstory',c.backstory)
      +bibleTxa(bkey,'notes','Notes',c.notes)
      +'<button onclick="genBibleImage(\'' + bkey + '\')" id="bible-btn-'+bkey+'" '
      +'style="margin-top:8px;width:100%;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:5px;color:#60a5fa;font-size:11px;padding:8px;cursor:pointer;font-family:inherit;letter-spacing:.04em;">'
      +'\u26a1 Generate Portrait</button>'
    +'</div>';
  }).join('');

  return '<div id="character-bible-section" style="margin-bottom:28px;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;">'
      +'<div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.08em;font-weight:600;">Character Bible</div>'
      +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<select id="portrait-model-sel" style="background:#0f0f1a;border:1px solid #2a2a4a;border-radius:4px;color:#aaa;font-size:10px;padding:5px 8px;font-family:inherit;cursor:pointer;">'
          +'<option value="wan">Wan 2.7</option>'
          +'<option value="banana">Nano Banana Pro</option>'
        +'</select>'
        +'<button onclick="genAllBibleImages()" '
        +'style="background:#0f0f1a;border:1px solid #2a2a4a;border-radius:4px;color:#60a5fa;font-size:10px;padding:5px 12px;cursor:pointer;font-family:inherit;">\u26a1 Generate All Portraits</button>'
      +'</div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;">'
      +cards
    +'</div>'
  +'</div>';
}

async function genBibleImage(bkey) {
  var c = CHARACTER_BIBLE[bkey];
  if (!c) return;
  var btn = document.getElementById('bible-btn-'+bkey);
  if (btn) { btn.textContent = '\u23f3 Generating...'; btn.disabled = true; }

  var prompt = 'Full body front-facing portrait, neutral dark background, cinematic lighting, photorealistic, ultra detailed, head to toe. '
    + 'Character: ' + c.name + '. '
    + (c.physicalDesc ? c.physicalDesc + '. ' : '')
    + (c.wardrobe ? 'Wearing: ' + c.wardrobe + '. ' : '')
    + (c.makeup ? c.makeup + '. ' : '')
    + 'Shot on Hasselblad medium format, sharp focus, full figure.';

  var portraitModel = (document.getElementById('portrait-model-sel') && document.getElementById('portrait-model-sel').value) || 'wan';
  try {
    var resp = await fetch('/.netlify/functions/gen-portrait', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt: prompt, model: portraitModel})
    });
    var data = await resp.json();
    if (data.imageUrl) {
      CHARACTER_BIBLE[bkey].imageUrl = data.imageUrl;
      var el = document.getElementById('character-bible-section');
      if (el) el.outerHTML = renderCharacterBible();
      toast(c.name + ' portrait ready!');
    } else {
      toast('Portrait failed: ' + (data.error || 'unknown'));
      if (btn) { btn.textContent = '\u26a1 Generate Portrait'; btn.disabled = false; }
    }
  } catch(e) {
    toast('Error: ' + e.message);
    if (btn) { btn.textContent = '\u26a1 Generate Portrait'; btn.disabled = false; }
  }
}

async function genAllBibleImages() {
  var keys = Object.keys(CHARACTER_BIBLE);
  if (!keys.length) { toast('No characters in bible yet'); return; }
  toast('Generating ' + keys.length + ' portraits...');
  for (var i = 0; i < keys.length; i++) {
    await genBibleImage(keys[i]);
    if (i < keys.length - 1) await sleep(600);
  }
  toast('All portraits done!');
}


// ── Scene Master Coverage Panel (shot-design) ────────────────────────────────
function toggleSceneMaster(scId, sec) {
  var panel = document.getElementById('smp-' + scId);
  if (!panel) return;
  if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  if (panel.innerHTML) return; // already built

  var sc = SCENES.find(function(s){ return s.id === scId; });
  if (!sec || sec !== 'shot-design') {
    panel.innerHTML = '<div style="padding:12px;color:#555;font-size:11px;">Scene master settings available in Shot Design tab.</div>';
    return;
  }

  // Build COVF master fields for this scene
  var master = (ST.shots['__master_' + scId] || {}).fields || {};
  var fields = COVF.map(function(pair) {
    var fk = pair[0], fl = pair[1];
    var val = master[fk] || '';
    return '<div style="display:flex;flex-direction:column;gap:3px;">'
      + '<div style="font-size:9px;font-weight:700;letter-spacing:.1em;color:#555;text-transform:uppercase;">' + fl + '</div>'
      + '<input type="text" value="' + val.replace(/"/g,'&quot;') + '" placeholder="Scene default..."'
      + ' style="background:#111;border:1px solid #2a2a2a;border-radius:4px;color:#ccc;font-size:11px;padding:5px 8px;"'
      + ' onchange="setSceneMasterField(\''+scId+'\',\''+fk+'\',this.value)">'
      + '</div>';
  }).join('');

  panel.innerHTML = '<div style="background:#0d0d0d;border:1px solid #1e1e1e;border-radius:6px;padding:14px 16px;margin:6px 0 10px;">'
    + '<div style="font-size:10px;font-weight:700;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;">'
    + 'Scene Master &mdash; ' + scId + ' &mdash; Coverage Defaults</div>'
    + '<div style="font-size:10px;color:#555;margin-bottom:12px;">These values are inherited by all clips in this scene unless overridden per-clip.</div>'
    + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">' + fields + '</div>'
    + '<div style="margin-top:12px;display:flex;gap:8px;">'
    + '<button onclick="applySceneMasterToAll(\''+scId+'\')" style="background:#1a2a1a;border:1px solid #2a5a2a;border-radius:4px;color:#4ade80;font-size:10px;padding:5px 12px;cursor:pointer;font-weight:600;">'
    + '&#9654; Apply to all clips in scene</button>'
    + '<button onclick="toggleSceneMaster(\''+scId+'\',\''+sec+'\')" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;color:#888;font-size:10px;padding:5px 12px;cursor:pointer;">'
    + 'Close</button>'
    + '</div></div>';
}

function setSceneMasterField(scId, field, value) {
  var mk = '__master_' + scId;
  if (!ST.shots[mk]) ST.shots[mk] = { fields: {} };
  if (!ST.shots[mk].fields) ST.shots[mk].fields = {};
  ST.shots[mk].fields[field] = value;
  saveShot(mk);
}

function applySceneMasterToAll(scId) {
  var sc = SCENES.find(function(s){ return s.id === scId; });
  if (!sc) return;
  var master = (ST.shots['__master_' + scId] || {}).fields || {};
  if (!Object.keys(master).length) { toast('No master fields set for ' + scId); return; }
  sc.clips.forEach(function(cid) {
    var k = key(cid);
    if (!ST.shots[k]) ST.shots[k] = { fields: {} };
    if (!ST.shots[k].fields) ST.shots[k].fields = {};
    Object.keys(master).forEach(function(fk) {
      if (!ST.shots[k].fields[fk]) ST.shots[k].fields[fk] = master[fk];
    });
    saveShot(k);
  });
  toast('Scene master applied to ' + sc.clips.length + ' clips in ' + scId);
}
